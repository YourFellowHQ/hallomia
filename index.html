document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   YourFellow HQ, shared site stylesheet (dark, video-led)\n   Basis: concept 05. Gebruikt op alle pagina's van de site.\n   ============================================================ */\n:root{\n  --bg:#0F1216;\n  --bg-2:#0B0E11;\n  --bg-band:#151A21;\n  --surface:#1A1F27;\n  --surface-2:#212733;\n  --line:#2A313B;\n  --line-2:#39414D;\n  --ink:#FFFFFF;\n  --ink-2:#D7DBE0;\n  --ink-soft:#969CA6;\n  --ink-mute:#6A707B;\n  --accent:#00FFCC;\n  --accent-deep:#00CCB3;\n  --accent-soft:rgba(0,255,204,0.14);\n  --on-accent:#062B25;\n  --r:10px;\n  --r-lg:16px;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nbody{\n  font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;\n  background:var(--bg);color:var(--ink);\n  font-size:16px;line-height:1.5;\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\na{color:inherit;text-decoration:none;}\nimg{display:block;max-width:100%;}\n.mono{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;}\n.wrap{max-width:1240px;margin:0 auto;padding:0 32px;}\n.wrap-wide{max-width:1600px;margin:0 auto;padding:0 32px;}\n@media(max-width:600px){.wrap,.wrap-wide{padding:0 20px;}}\n\n/* ---------- type helpers ---------- */\n.kicker{display:inline-flex;align-items:center;gap:10px;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:11.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);}\n.kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}\n.num{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:11.5px;color:var(--accent);letter-spacing:0.16em;}\nem{font-style:normal;color:inherit;}\n\n/* ---------- buttons ---------- */\n.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:600;font-size:14.5px;padding:13px 22px;border-radius:8px;font-family:inherit;cursor:pointer;border:0;transition:transform .15s, background .15s, border-color .15s;white-space:nowrap;}\n.btn.acc{background:var(--accent);color:var(--on-accent);}\n.btn.acc:hover{background:#00e6b8;transform:translateY(-1px);}\n.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-2);}\n.btn.ghost:hover{border-color:#444;}\n.btn.lg{padding:16px 28px;font-size:15.5px;}\n.arrow{display:inline-block;transition:transform .15s;}\n.btn:hover .arrow{transform:translateX(2px);}\n.txt-link{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14.5px;color:var(--accent);}\n.txt-link:hover{gap:11px;}\n\n/* ---------- topbar / nav ---------- */\n.topbar{padding:18px 0;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,18,22,0.85);backdrop-filter:blur(14px);z-index:60;}\n.topbar-in{display:flex;align-items:center;justify-content:space-between;gap:24px;}\n.brand{display:inline-flex;align-items:center;gap:10px;color:var(--ink);font-weight:700;font-size:16px;letter-spacing:-0.01em;}\n.brand .mk{height:28px;padding:0 8px;border-radius:7px;background:var(--accent);color:#062B25;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;letter-spacing:0.02em;}\n.brand .wordmark{color:var(--ink);}\n.brand .wordmark b{color:var(--accent);font-weight:700;}\n.nav-links{display:flex;align-items:center;gap:2px;}\n.nav-links a{font-size:14px;font-weight:500;padding:8px 13px;border-radius:6px;color:var(--ink-2);transition:background .15s,color .15s;white-space:nowrap;}\n.nav-links a:hover{background:rgba(255,255,255,0.05);color:var(--ink);}\n.nav-links a.on{color:var(--accent);}\n.nav-r{display:flex;align-items:center;gap:10px;}\n.nav-r .ghost{font-size:14px;color:var(--ink-2);padding:8px 12px;}\n.nav-r .ghost:hover{color:var(--ink);}\n.nav-r .cta{font-size:14px;font-weight:600;padding:9px 16px;ba );}\n.site-foot .bottom{border-top:1px solid var(--line);padding:22px 0;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:11.5px;color:var(--ink-mute);}\n.site-foot .bottom .links{display:flex;gap:20px;}\n.site-foot .bottom a:hover{color:var(--ink-soft);}\n\n/* ---------- misc ---------- */\n.glow-divider{height:1px;background:linear-gradient(90deg,transparent,var(--line-2),transparent);}\n\n/* heading balance */\nh1,h2,h3{text-wrap:balance;}\n<\u002Fstyle>\n<style>\n.mhero{display:grid;grid-template-columns:1.1fr 0.9fr;gap:54px;align-items:center;padding:30px 0 70px;}\n@media(max-width:880px){.mhero{grid-template-columns:1fr;gap:36px;}}\n.mhero h1{font-size:clamp(40px,5.4vw,72px);font-weight:600;letter-spacing:-0.035em;line-height:0.98;margin:16px 0 0;}\n.mhero .lede{margin-top:20px;font-size:18.5px;color:var(--ink-2);line-height:1.55;max-width:50ch;}\n.mhero .lede b{color:var(--ink);font-weight:600;}\n.mhero .acts{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px;}\n.portrait{position:relative;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line-2);aspect-ratio:4/5;background:#111;box-shadow:0 50px 120px -40px rgba(0,255,204,0.25);}\n.portrait img{width:100%;height:100%;object-fit:cover;}\n.portrait::after{content:\"\";position:absolute;inset:0;box-shadow:inset 0 0 110px rgba(0,255,204,0.14);pointer-events:none;}\n.portrait .chip{position:absolute;top:16px;right:16px;background:rgba(10,10,10,0.8);backdrop-filter:blur(8px);border:1px solid var(--line-2);border-radius:9px;padding:10px 13px;max-width:200px;}\n.portrait .chip b{display:block;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}\n.portrait .chip span{font-size:12.5px;color:var(--ink-2);line-height:1.35;}\n.portrait .badge{position:absolute;left:16px;bottom:16p :12px;color:var(--ink-2);line-height:1.45;}\n.ad-mock{padding:12px;}\n.ad-mock .lbl{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:9px;font-weight:700;color:var(--ink-soft);border:1px solid var(--line-2);padding:1px 4px;border-radius:3px;margin-bottom:6px;display:inline-block;}\n.ad-mock .url{font-size:11px;color:var(--ink-soft);margin-bottom:3px;}\n.ad-mock .ttl{font-size:13.5px;color:var(--accent-deep);font-weight:600;line-height:1.3;margin-bottom:4px;}\n.ad-mock .d{font-size:11.5px;color:var(--ink-2);line-height:1.4;}\n.seo-mock{padding:12px;}\n.seo-mock h5{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.3;}\n.seo-mock .ln{height:7px;background:var(--line-2);border-radius:4px;margin-bottom:6px;}\n.seo-mock .ln.s{width:55%;}.seo-mock .ln.m{width:80%;}.seo-mock .ln.l{width:95%;}\n.seo-mock .kws{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}\n.seo-mock .kw{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:9.5px;background:rgba(0,255,204,0.08);border:1px solid rgba(0,255,204,0.2);color:var(--accent);border-radius:5px;padding:3px 7px;}\n.approve-row{display:flex;gap:8px;margin-top:12px;}\n.approve-row .b{flex:1;background:var(--accent);color:var(--on-accent);text-align:center;font-size:12px;font-weight:600;padding:8px 0;border-radius:7px;}\n.approve-row .b.alt{flex:none;background:var(--surface);border:1px solid var(--line-2);color:var(--ink-2);padding:8px 12px;}\n\n.regie-band{background:linear-gradient(135deg,#101010,#0a0a0a);border:1px solid var(--line-2);border-radius:var(--r-lg);padding:44px;display:grid;grid-template-columns:auto 1fr auto;gap:30px;align-items:center;position:relative;overflow:hidden;}\n@media(max-width:820px){.regie-band{grid-template-columns:1fr;text-align:center;}}\n.regie-band::after{content:\"\";position:absolute;width:460px;height:460px;border-radius:50%;left:-130px;top:-260px;background:radial-gradient(circle,rgba(0,255,204,0.16),transparent 64%);}\n.regie-band>*{position:relative;z-index:2;}\n.regie-band .miniav{width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,255,204,0.4);box-shadow:0 0 24px rgba(0,255,204,0.3);justify-self:start;}\n@media(max-width:820px){.regie-band .miniav{justify-self:center;}}\n.regie-band .miniav img{width:100%;height:100%;object-fit:cover;}\n.regie-band h2{font-size:26px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;margin-bottom:6px;}\n.regie-band p{font-size:15px;color:var(--ink-soft);max-width:560px;line-height:1.55;}\n\n.priv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}\n@media(max-width:900px){.priv-grid{grid-template-columns:1fr;}}\n.priv .pi{width:40px;height:40px;border-radius:10px;background:rgba(0,255,204,0.08);border:1px solid rgba(0,255,204,0.18);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:15px;}\n.priv h3{font-size:16.5px;font-weight:600;margin-bottom:8px;letter-spacing:-0.01em;}\n.priv p{font-size:14px;color:var(--ink-soft);line-height:1.55;}\n\n.fc{padding:110px 0 120px;border-top:1px solid var(--line);position:relative;overflow:hidden;text-align:center;}\n.fc::after{content:\"\";position:absolute;width:680px;height:680px;border-radius:50%;left:50%;top:40%;transform:translateX(-50%);background:radial-gradient(circle,rgba(0,255,204,0.1),transparent 64%);}\n.fc-in{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}\n.fc-in h2{font-size:clamp(36px,5vw,66px);font-weight:600;letter-spacing:-0.035em;line-height:1.0;max-width:16ch;}\n.fc-in p{margin:20px 0 28px;font-size:17px;color:var(--ink-soft);max-width:52ch;line-height:1.6;}\n.fc-in .note{margin-top:18px;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:12px;color:var(--ink-mute);}\n<\u002Fstyle>\n<\u002Fhead>\n<body data-page=\"mia\">\n\n<div id=\"site-nav\"><\u002Fdiv>\n\n<div class=\"wrap crumb\"><a href=\"home-hallomia.html\">home<\u002Fa> / mia<\u002Fdiv>\n\n<main>\n  <section class=\"wrap mhero\">\n    <div>\n      <h1>Je hoeft Mia niks te <em>vragen.<\u002Fem><\u002Fh1>\n      <p class=\"lede\">Mia is geen AI-assistent die wacht op een opdracht of een prompt. Ze is je marketing-collega: ze kijkt mee in je cijfers, je kalender en je profiel, ziet zelf wat er speelt en schrijft en regelt het werk. <b>Het enige wat jij doet, is goedkeuren.<\u002Fb><\u002Fp>\n      <div class=\"regie\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg> Geen prompts, geen aansturen. Mia regelt het, jij keurt goed.<\u002Fdiv>\n      <div class=\"acts\">\n        <a class=\"btn acc lg\" href=\"aanmelden.html\">Vraag beta-toegang <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n        <a class=\"btn ghost lg\" href=\"#hoe\">Hoe werkt Mia?<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"portrait\">\n      <img src=\"916fce6b-7644-4bfa-ab86-d20811007c75\" alt=\"Mia, je marketing-collega in Hallo Mia\">\n      <div class=\"chip\"><b>Vandaag<\u002Fb><span>3 voorstellen klaar om goed te keuren<\u002Fspan><\u002Fdiv>\n      <div class=\"badge\"><span class=\"pulse\"><\u002Fspan> Mia is online<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WAT MIA IS -->\n  <section class=\"section\"><div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"l\"><h2>Een collega, geen tool om aan te sturen.<\u002Fh2><\u002Fdiv>\n      \n    <\u002Fdiv>\n    <div class=\"split\">\n      <div class=\"card\">\n        <h3>Wat Mia wel is<\u002Fh3>\n        <p class=\"lead\">De collega die uit zichzelf meekijkt, beslist wat nodig is en het werk klaarzet, zonder dat jij het hoeft te vragen.<\u002Fp>\n        <ul>\n          <li><span class=\"ic-yes\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Werkt op eigen initiatief: ze ziet het werk en zet het klaar, zonder dat jij iets vraagt<\u002Fli>\n          <li><span class=\"ic-yes\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Schrijft én regelt posts, advertenties en webteksten in jouw stem<\u002Fli>\n          <li><span class=\"ic-yes\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Kent je bedrijfsprofiel, je doelen en je cijfers, en let op wat stijgt of daalt<\u002Fli>\n          <li><span class=\"ic-yes\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Legt alles uit in gewone taal, zonder jargon<\u002Fli>\n          <li><span class=\"ic-yes\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Denkt vooruit rond feestdagen en relevante momenten<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3>Wat Mia niet is<\u002Fh3>\n        <p class=\"lead\">Geen promptveld, geen chatbot, geen autopilot. Je stuurt haar niet aan en je vervangt je oordeel niet.<\u002Fp>\n        <ul>\n          <li><span class=\"ic-no\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan>Geen assistent die wacht op een opdracht of een prompt<\u002Fli>\n          <li><span class=\"ic-no\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan>Geen chatbot waar jij eerst moet typen wat je wilt<\u002Fli>\n          <li><span class=\"ic-no\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan>Geen knop die zelf publiceert. Alles wacht op jouw goedkeuring<\u002Fli>\n          <li><span class=\"ic-no\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan>Geen vervanger van jouw oordeel of merkgevoel; zij kan fouten maken, jij beslist<\u002Fli>\n          <li><span class=\"ic-no\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan>Geen los abonnement, ze zit standaard in Hallo Mia<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n\n  <!-- HOE MIA WERKT -->\n  <section class=\"section\" id=\"hoe\"><div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"l\"><h2>Vier stappen. Jij komt er pas bij stap vier aan te pas.<\u002Fh2><\u002Fdiv>\n      <div class=\"r\">Je hoeft niets te vragen. Mia doorloopt stap 1 tot en met 3 uit zichzelf; jij doet alleen stap 4: goedkeuren.<\u002Fdiv>\n      \n    <\u002Fdiv>\n    <div class=\"flow\">\n      <div class=\"card step\"><div class=\"n\">1<\u002Fdiv><h3>Ze leest je bedrijf<\u002Fh3><p>Mia gebruikt je bedrijfsprofiel en je gekoppelde data als vertrekpunt.<\u002Fp><\u002Fdiv>\n      <div class=\"card step\"><div class=\"n\">2<\u002Fdiv><h3>Ze ziet wat opvalt<\u002Fh3><p>Stijging of daling, een feestdag die eraan komt, een pagina die zoekverkeer mist.<\u002Fp><\u002Fdiv>\n      <div class=\"card step\"><div class=\"n\">3<\u002Fdiv><h3>Ze doet een voorstel<\u002Fh3><p>Een concrete actie: een post, een advertentietekst, een SEO-pagina. In jouw stem.<\u002Fp><\u002Fdiv>\n      <div class=\"card step\"><div class=\"n\">4<\u002Fdiv><h3>Jij keurt goed<\u002Fh3><p>Goedkeuren, aanpassen of overslaan. Pas na jouw klik gaat het live.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n\n  <!-- VOORBEELDEN -->\n  <section class=\"section\"><div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"l\"><h2>Drie voorbeelden uit een werkdag.<\u002Fh2><\u002Fdiv>\n      \n    <\u002Fdiv>\n    <div class=\"ex-grid\">\n      <div class=\"card ex\">\n        <div class=\"ex-head\"><span class=\"tag\">post<\u002Fspan><\u002Fdiv>\n        <h3>Een post rond Moederdag<\u002Fh3>\n        <p class=\"lead\">Mia ziet de feestdag in je kalender en stelt een post voor in de stem van Bracefox.<\u002Fp>\n        <div class=\"ex-mock\">\n          <div class=\"mia-line\"><div class=\"av\"><img src=\"1beddb77-3c3e-4be2-87d4-142a67f32bd0\" alt=\"\"><\u002Fdiv><div class=\"bub\"><b>Mia.<\u002Fb> Moederdag is over 9 dagen. Een post voor Instagram klaarzetten? Hier een eerste opzet.<\u002Fdiv><\u002Fdiv>\n          <div class=\"mock-card\">\n            <div class=\"top\"><div class=\"av-sm\">B<\u002Fdiv><div class=\"nm\">bracefox.nl<\u002Fdiv><\u002Fdiv>\n            <div class=\"img\"><\u002Fdiv>\n            <div class=\"cap\">Een mooie glimlach is misschien wel het mooiste cadeau. Deze Moederdag: de eerste 10 moeders een gratis intake.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"approve-row\"><div class=\"b\">Goedkeuren<\u002Fdiv><div class=\"b alt\">Aanpassen<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card ex\">\n        <div class=\"ex-head\"><span class=\"tag\">advertentie<\u002Fspan><\u002Fdiv>\n        <h3>Een advertentie voor Google<\u002Fh3>\n        <p class=\"lead\">Mia merkt dat je op \"onzichtbare beugel\" weinig vertoningen hebt en schrijft een variant.<\u002Fp>\n        <div class=\"ex-mock\">\n          <div class=\"mia-line\"><div class=\"av\"><img src=\"1beddb77-3c3e-4be2-87d4-142a67f32bd0\" alt=\"\"><\u002Fdiv><div class=\"bub\"><b>Mia.<\u002Fb> Op \"onzichtbare beugel\" liep je vorige maand mis op vertoningen. Deze variant testen?<\u002Fdiv><\u002Fdiv>\n          <div class=\"mock-card ad-mock\">\n            <span class=\"lbl\">Adv<\u002Fspan>\n            <div class=\"url\">bracefox.nl · Onzichtbare beugel<\u002Fdiv>\n            <div class=\"ttl\">Onzichtbare beugel zonder gedoe | Gratis intake<\u002Fdiv>\n            <div class=\"d\">Persoonlijk plan, vaste prijs en korte lijntjes. Boek je gratis intake online.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"approve-row\"><div class=\"b\">Goedkeuren<\u002Fdiv><div class=\"b alt\">Aanpassen<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card ex\">\n        <div class=\"ex-head\"><span class=\"tag\">seo / geo<\u002Fspan><\u002Fdiv>\n        <h3>Een pagina op echte zoekwoorden<\u002Fh3>\n        <p class=\"lead\">Mia ziet vraag naar \"beugel volwassenen kosten\" en stelt een nieuwe webpagina voor.<\u002Fp>\n        <div class=\"ex-mock\">\n          <div class=\"mia-line\"><div class=\"av\"><img src=\"1beddb77-3c3e-4be2-87d4-142a67f32bd0\" alt=\"\"><\u002Fdiv><div class=\"bub\"><b>Mia.<\u002Fb> 480 zoekopdrachten per maand, jij staat nog niet in de top 20. Pagina klaargezet.<\u002Fdiv><\u002Fdiv>\n          <div class=\"mock-card seo-mock\">\n            <h5>Beugel voor volwassenen, wat kost dat?<\u002Fh5>\n            <div class=\"ln l\"><\u002Fdiv><div class=\"ln m\"><\u002Fdiv><div class=\"ln s\"><\u002Fdiv>\n            <div class=\"kws\"><span class=\"kw\">beugel volwassenen kosten<\u002Fspan><span class=\"kw\">onzichtbare beugel prijs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"approve-row\"><div class=\"b\">Goedkeuren<\u002Fdiv><div class=\"b alt\">Aanpassen<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n\n  <!-- REGIE BAND -->\n  <section class=\"section\" style=\"border-top:0;padding-top:0;\"><div class=\"wrap\">\n    <div class=\"regie-band\">\n      <div class=\"miniav\"><img src=\"1beddb77-3c3e-4be2-87d4-142a67f32bd0\" alt=\"Mia\"><\u002Fdiv>\n      <div>\n        <h2>Mia stelt voor, jij keurt goed.<\u002Fh2>\n        <p>Iedere actie van Mia heeft een goedkeur-knop. Jij hoeft niets te vragen of te typen. Je beslist alleen wat eruit gaat. Geen knop, geen post. Geen knop, geen advertentie. Zo blijft jouw stem jouw stem.<\u002Fp>\n      <\u002Fdiv>\n      <a class=\"btn acc\" href=\"aanmelden.html\" style=\"white-space:nowrap;\">Probeer Hallo Mia <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n\n  <!-- PRIVACY -->\n  <section class=\"section\" id=\"privacy\"><div class=\"wrap\">\n    <div class=\"shead\">\n      <div class=\"l\"><h2>Je bedrijfsdata is van jou.<\u002Fh2><\u002Fdiv>\n      \n    <\u002Fdiv>\n    <div class=\"priv-grid\">\n      <div class=\"card priv\"><div class=\"pi\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Niet voor andere klanten gebruikt<\u002Fh3><p>Wat jij koppelt en schrijft is voor jouw account. We trainen geen modellen op jouw bedrijfsdata.<\u002Fp><\u002Fdiv>\n      <div class=\"card priv\"><div class=\"pi\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Hosting in Europa<\u002Fh3><p>Servers in Europa. Verwerking voldoet aan de AVG. Geen verrassingen over waar je data staat.<\u002Fp><\u002Fdiv>\n      <div class=\"card priv\"><div class=\"pi\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg><\u002Fdiv><h3>Jij houdt de sleutels<\u002Fh3><p>Je kunt elke koppeling op elk moment losmaken. Stoppen met Hallo Mia betekent dat je data eruit gaat.<\u002Fp><\u002Fdiv>\n      <div class=\"card priv\"><div class=\"pi\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Geen verborgen publicaties<\u002Fh3><p>Mia heeft geen knop die zelf publiceert. Iedere post en advertentie wacht op jouw goedkeuring.<\u002Fp><\u002Fdiv>\n      <div class=\"card priv\"><div class=\"pi\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><h3>Eerlijk over modellen<\u002Fh3><p>Hallo Mia gebruikt bestaande AI-modellen. Welke en waarvoor leggen we open uit in Uitleg.<\u002Fp><\u002Fdiv>\n      <div class=\"card priv\"><div class=\"pi\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Vragen open? Stel ze.<\u002Fh3><p>Twijfel je of iets veilig genoeg is? Vraag het ons voor je koppelt. Eerlijk antwoord, geen verkoop.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n\n  <!-- FINAL -->\n  <section class=\"fc\"><div class=\"wrap fc-in\">\n    <h2>Wil je Mia aan het werk <em>zien?<\u002Fem><\u002Fh2>\n    <p>Vraag beta-toegang aan. We zetten je bedrijfsprofiel klaar en Mia opent het eerste gesprek.<\u002Fp>\n    <div class=\"acts\" style=\"display:flex;gap:12px;flex-wrap:wrap;justify-content:center;\"><a class=\"btn acc lg\" href=\"aanmelden.html\">Vraag beta-toegang <span class=\"arrow\">→<\u002Fspan><\u002Fa><a class=\"btn ghost lg\" href=\"uitleg.html\">Bekijk de uitleg<\u002Fa><\u002Fdiv>\n  <\u002Fdiv><\u002Fsection>\n<\u002Fmain>\n\n<div id=\"site-foot\"><\u002Fdiv>\n<script src=\"413ae280-c98f-443c-b6ce-fbfd170e62fa\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
