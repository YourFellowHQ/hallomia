<!-- ============================================================
     Homepage HEADER (hero-sectie) van hallomia.ai
     Let op: deze markup gebruikt de gedeelde stijlen uit
     assets/site.css + de <style>-blokken in index.html, en de
     typmachine/iframe-logica uit assets/site-hm.js / mia-type.js.
     Los geplakt rendert het dus niet vanzelf met opmaak.
     ============================================================ -->

<!-- HERO -->
<section class="split">
  <!-- LINKS — Mia vraagt -->
  <div class="ask">
    <div class="mia-id">
      <span class="av"><img src="assets/mia-face.jpg" alt="Mia"></span>
      <span class="who"><b>Mia</b><span class="role"><span class="dot"></span>je AI-collega</span></span>
    </div>
    <h1 class="ask-title">Vraag het <em>Mia.</em></h1>
    <div class="composer live">
      <div class="qwrap">
        <span class="label">Hallo Mia,</span>
        <span class="qline"><span class="q in" id="miaTyped">hoe staan we ervoor?</span><span class="caret"></span></span>
      </div>
      <button class="send" aria-label="Verstuur naar Mia"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
    </div>
    <div class="making"><span class="sp"></span><span>Mia maakt <b id="makeTag">je dashboard</b></span></div>
    <p class="sub">Jij vraagt, Mia maakt het meteen. Rechts zie je haar voorstel, jij keurt goed.</p>
  </div>

  <!-- RECHTS — wat Mia toont -->
  <div class="show">
    <div class="show-frame">
      <div class="panels" id="panels">
        <div class="panel active" data-out="dash"><iframe data-src="assets/out-dash.html" title="Mia toont het dashboard" scrolling="no"></iframe></div>
        <div class="panel" data-out="social"><iframe data-src="assets/out-social.html" title="Mia maakt een social post" scrolling="no"></iframe></div>
        <div class="panel" data-out="ads"><iframe data-src="assets/out-ads.html" title="Mia scherpt een advertentie aan" scrolling="no"></iframe></div>
        <div class="panel" data-out="seo"><iframe data-src="assets/out-seo.html" title="Mia verbetert een SEO-tekst" scrolling="no"></iframe></div>
        <div class="panel" data-out="news"><iframe data-src="assets/out-news.html" title="Mia zet de nieuwsbrief klaar" scrolling="no"></iframe></div>
      </div>
    </div>
  </div>
</section>
