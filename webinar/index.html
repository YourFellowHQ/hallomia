/* ====== webinar · split layout (zelfde opzet als early-access) ====== */
.eb{position:relative;}
.eb-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);min-height:calc(100vh - 76px);}
@media(max-width:880px){.eb-grid{grid-template-columns:1fr;min-height:0;}}

/* ---- links: Mia's foto ---- */
.eb-photo{position:relative;overflow:hidden;background:#1c1a16;}
.eb-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 40%;transform:scale(1.18);transform-origin:50% 36%;}
@media(max-width:880px){.eb-photo{aspect-ratio:4/3;}}
@media(max-width:520px){.eb-photo{aspect-ratio:1/1;}}
.eb-photo::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,rgba(20,17,12,0.62),transparent 42%);}
.eb-tag{position:absolute;z-index:2;left:32px;bottom:30px;display:flex;align-items:center;gap:12px;color:#fff;}
@media(max-width:520px){.eb-tag{left:20px;bottom:20px;}}
.eb-tag .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 4px rgba(14,156,134,0.35);flex:none;}
.eb-tag .who{font-weight:700;font-size:17px;letter-spacing:-0.01em;line-height:1.1;}
.eb-tag .role{font-size:12.5px;font-weight:500;opacity:0.85;margin-top:2px;}

/* ---- rechts: inhoud ---- */
.eb-body{display:flex;flex-direction:column;justify-content:center;padding:64px 64px;position:relative;background:var(--surface);}
@media(max-width:1100px){.eb-body{padding:56px 44px;}}
@media(max-width:880px){.eb-body{padding:52px 28px 68px;}}
@media(max-width:520px){.eb-body{padding:42px 20px 56px;}}
.eb-body::before{content:"";position:absolute;z-index:0;width:520px;height:520px;border-radius:50%;
  right:-180px;top:-160px;background:radial-gradient(circle,rgba(14,156,134,0.13),transparent 64%);pointer-events:none;}
.eb-inner{position:relative;z-index:1;width:100%;max-width:520px;}

.eb-eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',ui-monospace,monospace;
  font-size:11.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);}
.eb-eyebrow::before{content:"";width:22px;height:1.5px;background:var(--accent);display:inline-block;}
.eb h1{font-size:clamp(38px,5vw,60px);font-weight:600;letter-spacing:-0.04em;line-height:1.0;
  margin:18px 0 0;text-wrap:balance;}
.eb h1 em{font-style:normal;color:var(--accent);}
.eb-lead{margin:18px 0 0;font-size:clamp(16px,1.5vw,18px);color:var(--ink-2);line-height:1.6;max-width:46ch;text-wrap:pretty;}
.eb-lead b{color:var(--ink);font-weight:600;}

.eb-pick-h{margin:30px 0 12px;font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);}
.eb .wb-dates{max-height:300px;overflow:auto;padding-right:3px;}

.eb-form{margin:22px 0 0;display:flex;flex-direction:column;gap:11px;}
.eb-row{display:flex;gap:10px;}
@media(max-width:520px){.eb-row{flex-direction:column;}}
.eb-row input{flex:1;font-family:inherit;font-size:16px;color:var(--ink);background:var(--bg);
  border:1px solid var(--line-2);border-radius:10px;padding:15px 17px;transition:border-color .15s,box-shadow .15s;}
.eb-row input::placeholder{color:var(--ink-mute);}
.eb-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.eb-row .btn{padding:15px 24px;font-size:15.5px;white-space:nowrap;}
.eb-fine{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin:2px 0 0;}

.eb-done{margin:24px 0 0;display:none;flex-direction:column;gap:10px;
  background:var(--bg);border:1px solid var(--line);border-radius:15px;padding:26px 24px;}
.eb-done.show{display:flex;}
.eb-done .check{width:42px;height:42px;border-radius:50%;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;color:var(--accent);}
.eb-done h3{font-size:20px;font-weight:600;letter-spacing:-0.01em;}
.eb-done p{font-size:14.5px;color:var(--ink-soft);line-height:1.6;max-width:42ch;}
